<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Carnot — Experiment interactiv</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f0f4fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  .stag {
    font-size: 11px;
    color: #185FA5;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .sh {
    font-size: 28px;
    font-weight: 500;
    color: #1a1a2e;
    margin-bottom: 28px;
  }
  .slider-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 28px 28px 22px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    margin-bottom: 16px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .slider-label {
    font-size: 13px;
    color: #666;
    min-width: 160px;
  }
  input[type=range] {
    flex: 1;
    accent-color: #185FA5;
    height: 6px;
    cursor: pointer;
  }
  .slider-val {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
    min-width: 80px;
    text-align: right;
  }
  .result-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  @media (max-width: 520px) {
    .result-row { grid-template-columns: 1fr; }
    .slider-label { min-width: 110px; font-size: 12px; }
  }
  .res-card {
    background: #f0f4fa;
    border-radius: 12px;
    padding: 18px 14px;
    text-align: center;
    border: 1.5px solid #e0e8f5;
    transition: transform .15s;
  }
  .res-card:hover { transform: translateY(-2px); }
  .res-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .res-val {
    font-size: 32px;
    font-weight: 700;
    color: #185FA5;
    line-height: 1;
  }
  .res-val.warn { color: #A32D2D; }
  .res-unit {
    font-size: 11px;
    color: #aaa;
    margin-top: 6px;
    font-family: monospace;
  }
  .info-box {
    background: #E6F1FB;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.7;
    border-left: 4px solid #185FA5;
  }
  .formula-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .formula {
    background: #042C53;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: monospace;
    font-size: 14px;
    color: #85B7EB;
    flex: 1;
    text-align: center;
    letter-spacing: .5px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="sh">Randamentul Carnot și emisiile motorului</div>
 
  <div class="formula-row">
    <div class="formula">η = 1 − T₂/T₁</div>
    <div class="formula">Qc = (1 − η) · P</div>
    <div class="formula">CO₂ ≈ 0.3 g/kJ</div>
  </div>
 
  <div class="slider-wrap">
    <div class="slider-row">
      <span class="slider-label">T sursă caldă (°C)</span>
      <input type="range" min="200" max="800" value="500" step="10" id="t1">
      <span class="slider-val" id="t1-val">500 °C</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">T sursă rece (°C)</span>
      <input type="range" min="20" max="200" value="30" step="5" id="t2">
      <span class="slider-val" id="t2-val">30 °C</span>
    </div>
    <div class="slider-row" style="margin-bottom:22px">
      <span class="slider-label">Putere motor (kW)</span>
      <input type="range" min="10" max="500" value="100" step="10" id="pw">
      <span class="slider-val" id="pw-val">100 kW</span>
    </div>
 
    <div class="result-row">
      <div class="res-card">
        <div class="res-label">Randament Carnot</div>
        <div class="res-val" id="eta">62%</div>
        <div class="res-unit">η = 1 − T₂/T₁</div>
      </div>
      <div class="res-card">
        <div class="res-label">Căldură disipată</div>
        <div class="res-val warn" id="qdis">38 kW</div>
        <div class="res-unit">Qc = (1−η) · P</div>
      </div>
      <div class="res-card">
        <div class="res-label">CO₂ estimat</div>
        <div class="res-val warn" id="co2">30 g/s</div>
        <div class="res-unit">~0.3 g/kJ combustie</div>
      </div>
    </div>
  </div>

 
<script>
  const t1El = document.getElementById('t1');
  const t2El = document.getElementById('t2');
  const pwEl = document.getElementById('pw');
 
  function updateCalc() {
    const T1 = parseInt(t1El.value) + 273.15;
    const T2 = parseInt(t2El.value) + 273.15;
    const P  = parseInt(pwEl.value);
 
    // Carnot efficiency
    const eta  = Math.max(0, Math.round((1 - T2 / T1) * 100));
    const qdis = Math.round((1 - eta / 100) * P);
    const co2  = Math.round(P * 0.3);
 
    document.getElementById('t1-val').textContent = t1El.value + ' °C';
    document.getElementById('t2-val').textContent = t2El.value + ' °C';
    document.getElementById('pw-val').textContent = P + ' kW';
    document.getElementById('eta').textContent    = eta + '%';
    document.getElementById('qdis').textContent   = qdis + ' kW';
    document.getElementById('co2').textContent    = co2 + ' g/s';
    document.getElementById('inf-t1').textContent = Math.round(T1) + ' K';
    document.getElementById('inf-t2').textContent = Math.round(T2) + ' K';
  }
 
  t1El.addEventListener('input', updateCalc);
  t2El.addEventListener('input', updateCalc);
  pwEl.addEventListener('input', updateCalc);
  updateCalc();
</script>
</body>
</html>
